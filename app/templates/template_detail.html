{% extends "base.html" %}
{% block title %}{{ template.title }} - TSE Hub{% endblock %}

{% block content %}
<div class="p-8 max-w-4xl mx-auto animate-in">
    <div class="flex items-center gap-4 mb-6">
        <a href="/templates" class="text-dd-text-dim hover:text-white transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </a>
        <div>
            <h1 class="text-xl font-bold text-white tracking-tight">{{ template.title }}</h1>
            <p class="text-dd-text-dim text-sm mt-0.5">{{ category.replace('-', ' ').replace('_', ' ').title() }}</p>
        </div>
    </div>

    <div class="card p-6">
        <div class="md-content">{{ template.html|safe }}</div>
        <div class="mt-6 pt-3 border-t border-dd-border flex items-center justify-between">
            <span class="text-xs text-dd-text-dim">{{ template.path }}</span>
            <button onclick="copyRaw()" class="text-xs text-dd-purple-light hover:text-white transition-colors flex items-center gap-1.5" id="copy-btn">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                Copy raw markdown
            </button>
        </div>
    </div>
</div>

<script>
const rawContent = {{ template.raw|tojson }};
function copyRaw() {
    navigator.clipboard.writeText(rawContent).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.innerHTML = '<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> Copied!';
        setTimeout(() => {
            btn.innerHTML = '<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg> Copy raw markdown';
        }, 2000);
    });
}
</script>
{% endblock %}
