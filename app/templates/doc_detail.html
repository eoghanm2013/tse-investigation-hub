{% extends "base.html" %}
{% block title %}{{ doc.title }} - TSE Hub{% endblock %}

{% block content %}
<div class="animate-in">
    <div class="sticky top-0 z-10 toolbar" style="border-bottom: 2px solid var(--c-border);">
        <div class="max-w-5xl mx-auto px-6 py-2">
            <div class="flex items-center gap-2 text-[12px]">
                <a href="/docs" class="text-dd-text-dim hover:text-dd-text-muted" style="text-decoration: underline;">Docs</a>
                <span class="text-dd-text-dim">&gt;</span>
                <span class="font-bold" style="color: #1A1A2E;">{{ doc.title }}</span>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto px-6 py-5">
        <div class="card overflow-hidden">
            <div class="flex items-center justify-between px-4 py-2" style="background: #F0EBF5; border-bottom: 1px solid #D8CCE8;">
                <span class="text-[11px] text-dd-text-dim font-mono">{{ doc.path }}</span>
                <button onclick="copyRaw()" id="copy-btn" class="btn-y2k text-[11px] py-0.5 px-2 inline-flex items-center gap-1">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                    Copy markdown
                </button>
            </div>
            <div class="px-6 py-5 bg-white">
                <div class="md-content max-w-none">{{ doc.html|safe }}</div>
            </div>
        </div>
    </div>
</div>

<script>
const rawContent = {{ doc.raw|tojson }};
function copyRaw() {
    navigator.clipboard.writeText(rawContent).then(() => {
        const btn = document.getElementById('copy-btn');
        const orig = btn.innerHTML;
        btn.innerHTML = '<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> Copied!';
        setTimeout(() => { btn.innerHTML = orig; }, 2000);
    });
}
</script>
{% endblock %}
